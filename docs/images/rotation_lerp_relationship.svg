<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF6B35"/>
    </marker>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#E8D5B7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="750" fill="#1A1A2E" rx="12"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" fill="#E8D5B7" font-family="monospace" font-size="20" font-weight="bold">How Hand Rotation Drives Linear Interpolation</text>
  <line x1="80" y1="48" x2="1120" y2="48" stroke="#FF6B35" stroke-width="1" opacity="0.5"/>

  <!-- ============================================ -->
  <!-- LEFT: Hand tilt angles with normalized x     -->
  <!-- ============================================ -->
  <text x="170" y="75" text-anchor="middle" fill="#FF6B35" font-family="monospace" font-size="13" font-weight="bold">HAND TILT → NORMALIZED x</text>

  <!-- Row 1: -60° -->
  <g transform="translate(30, 95)">
    <line x1="40" y1="50" x2="25" y2="10" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="40" cy="50" r="3" fill="#E8D5B7"/>
    <circle cx="25" cy="10" r="3" fill="#FF6B35"/>
    <text x="15" y="5" text-anchor="end" fill="#FF6B35" font-family="monospace" font-size="11" font-weight="bold">-60°</text>
    <text x="80" y="35" fill="#888" font-family="monospace" font-size="11">x = -1.00</text>
    <path d="M 40 40 A 10 10 0 0 0 32 35" fill="none" stroke="#FFD700" stroke-width="1"/>
  </g>

  <!-- Row 2: -30° -->
  <g transform="translate(30, 170)">
    <line x1="40" y1="50" x2="30" y2="10" stroke="#FF6B35" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="40" cy="50" r="3" fill="#E8D5B7"/>
    <circle cx="30" cy="10" r="3" fill="#FF6B35"/>
    <text x="15" y="5" text-anchor="end" fill="#FF6B35" font-family="monospace" font-size="11" font-weight="bold">-30°</text>
    <text x="80" y="35" fill="#888" font-family="monospace" font-size="11">x = -0.50</text>
    <path d="M 40 40 A 10 10 0 0 0 35 37" fill="none" stroke="#FFD700" stroke-width="1"/>
  </g>

  <!-- Row 3: 0° -->
  <g transform="translate(30, 245)">
    <line x1="40" y1="50" x2="40" y2="10" stroke="#FFD700" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="40" cy="50" r="3" fill="#E8D5B7"/>
    <circle cx="40" cy="10" r="3" fill="#FFD700"/>
    <text x="55" y="5" fill="#FFD700" font-family="monospace" font-size="11" font-weight="bold">0°</text>
    <text x="80" y="35" fill="#888" font-family="monospace" font-size="11">x = 0.00</text>
  </g>

  <!-- Row 4: +30° -->
  <g transform="translate(30, 320)">
    <line x1="40" y1="50" x2="50" y2="10" stroke="#B849E8" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="40" cy="50" r="3" fill="#E8D5B7"/>
    <circle cx="50" cy="10" r="3" fill="#B849E8"/>
    <text x="65" y="5" fill="#B849E8" font-family="monospace" font-size="11" font-weight="bold">+30°</text>
    <text x="80" y="35" fill="#888" font-family="monospace" font-size="11">x = +0.50</text>
    <path d="M 40 40 A 10 10 0 0 1 45 37" fill="none" stroke="#FFD700" stroke-width="1"/>
  </g>

  <!-- Row 5: +60° -->
  <g transform="translate(30, 395)">
    <line x1="40" y1="50" x2="55" y2="10" stroke="#B849E8" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="40" cy="50" r="3" fill="#E8D5B7"/>
    <circle cx="55" cy="10" r="3" fill="#B849E8"/>
    <text x="70" y="5" fill="#B849E8" font-family="monospace" font-size="11" font-weight="bold">+60°</text>
    <text x="80" y="35" fill="#888" font-family="monospace" font-size="11">x = +1.00</text>
    <path d="M 40 40 A 10 10 0 0 1 48 35" fill="none" stroke="#FFD700" stroke-width="1"/>
  </g>

  <!-- Arrow from left to graph -->
  <line x1="130" y1="250" x2="270" y2="250" stroke="#FF6B35" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="200" y="240" text-anchor="middle" fill="#E8D5B7" font-family="monospace" font-size="10">x feeds in</text>

  <!-- ============================================ -->
  <!-- RIGHT: Lerp Graph                            -->
  <!-- ============================================ -->
  <text x="720" y="75" text-anchor="middle" fill="#FF6B35" font-family="monospace" font-size="13" font-weight="bold">LERP GRAPH — y = 0.1 + ((x+1)/2) × 0.8</text>

  <g transform="translate(300, 100)">
    <!-- Axes -->
    <line x1="60" y1="360" x2="720" y2="360" stroke="#E8D5B7" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
    <line x1="60" y1="30" x2="60" y2="360" stroke="#E8D5B7" stroke-width="1.5" marker-end="url(#arrowWhite)"/>

    <!-- Axis labels -->
    <text x="390" y="390" text-anchor="middle" fill="#E8D5B7" font-family="monospace" font-size="12">x = normalized gesture signal</text>
    <text x="20" y="200" text-anchor="middle" fill="#E8D5B7" font-family="monospace" font-size="12" transform="rotate(-90, 20, 200)">y = delay feedback</text>

    <!-- X-axis ticks -->
    <line x1="60" y1="360" x2="60" y2="366" stroke="#E8D5B7" stroke-width="1"/>
    <text x="60" y="380" text-anchor="middle" fill="#FF6B35" font-family="monospace" font-size="11" font-weight="bold">-1.0</text>

    <line x1="225" y1="360" x2="225" y2="366" stroke="#E8D5B7" stroke-width="1"/>
    <text x="225" y="380" text-anchor="middle" fill="#FF6B35" font-family="monospace" font-size="11" font-weight="bold">-0.5</text>

    <line x1="390" y1="360" x2="390" y2="366" stroke="#E8D5B7" stroke-width="1"/>
    <text x="390" y="380" text-anchor="middle" fill="#FF6B35" font-family="monospace" font-size="11" font-weight="bold">0.0</text>

    <line x1="555" y1="360" x2="555" y2="366" stroke="#E8D5B7" stroke-width="1"/>
    <text x="555" y="380" text-anchor="middle" fill="#FF6B35" font-family="monospace" font-size="11" font-weight="bold">+0.5</text>

    <line x1="720" y1="360" x2="720" y2="366" stroke="#E8D5B7" stroke-width="1"/>
    <text x="720" y="380" text-anchor="middle" fill="#FF6B35" font-family="monospace" font-size="11" font-weight="bold">+1.0</text>

    <!-- Y-axis ticks -->
    <line x1="54" y1="360" x2="60" y2="360" stroke="#E8D5B7" stroke-width="1"/>
    <text x="48" y="364" text-anchor="end" fill="#FF6B35" font-family="monospace" font-size="11" font-weight="bold">0.1</text>

    <line x1="54" y1="280" x2="60" y2="280" stroke="#E8D5B7" stroke-width="1"/>
    <text x="48" y="284" text-anchor="end" fill="#FF6B35" font-family="monospace" font-size="11" font-weight="bold">0.3</text>

    <line x1="54" y1="200" x2="60" y2="200" stroke="#E8D5B7" stroke-width="1"/>
    <text x="48" y="204" text-anchor="end" fill="#FF6B35" font-family="monospace" font-size="11" font-weight="bold">0.5</text>

    <line x1="54" y1="120" x2="60" y2="120" stroke="#E8D5B7" stroke-width="1"/>
    <text x="48" y="124" text-anchor="end" fill="#FF6B35" font-family="monospace" font-size="11" font-weight="bold">0.7</text>

    <line x1="54" y1="40" x2="60" y2="40" stroke="#E8D5B7" stroke-width="1"/>
    <text x="48" y="44" text-anchor="end" fill="#FF6B35" font-family="monospace" font-size="11" font-weight="bold">0.9</text>

    <!-- Interpolation line -->
    <line x1="60" y1="360" x2="720" y2="40" stroke="#FF6B35" stroke-width="3" opacity="0.7"/>

    <!-- Point 1: x=-1.0, y=0.1 -->
    <circle cx="60" cy="360" r="6" fill="#FF6B35" filter="url(#glow)"/>
    <text x="80" y="355" fill="#FF6B35" font-family="monospace" font-size="10" font-weight="bold">(-1.0, 0.10)</text>
    <text x="80" y="370" fill="#888" font-family="monospace" font-size="9">-60° tilt</text>

    <!-- Point 2: x=-0.5, y=0.3 -->
    <circle cx="225" cy="280" r="6" fill="#FF6B35" filter="url(#glow)"/>
    <text x="225" y="268" text-anchor="middle" fill="#FF6B35" font-family="monospace" font-size="10" font-weight="bold">(-0.5, 0.30)</text>
    <text x="225" y="253" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">-30° tilt</text>

    <!-- Point 3: x=0.0, y=0.5 -->
    <circle cx="390" cy="200" r="6" fill="#FFD700" filter="url(#glow)"/>
    <text x="410" y="195" fill="#FFD700" font-family="monospace" font-size="10" font-weight="bold">(0.0, 0.50)</text>
    <text x="410" y="210" fill="#888" font-family="monospace" font-size="9">0° straight up</text>

    <!-- Point 4: x=+0.5, y=0.7 -->
    <circle cx="555" cy="120" r="6" fill="#B849E8" filter="url(#glow)"/>
    <text x="555" y="108" text-anchor="middle" fill="#B849E8" font-family="monospace" font-size="10" font-weight="bold">(+0.5, 0.70)</text>
    <text x="555" y="93" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">+30° tilt</text>

    <!-- Point 5: x=+1.0, y=0.9 -->
    <circle cx="720" cy="40" r="6" fill="#B849E8" filter="url(#glow)"/>
    <text x="700" y="35" text-anchor="end" fill="#B849E8" font-family="monospace" font-size="10" font-weight="bold">(+1.0, 0.90)</text>
    <text x="700" y="50" text-anchor="end" fill="#888" font-family="monospace" font-size="9">+60° tilt</text>
  </g>

  <!-- ============================================ -->
  <!-- BOTTOM: Formula breakdown                    -->
  <!-- ============================================ -->
  <g transform="translate(50, 530)">
    <rect x="0" y="0" width="1100" height="200" rx="10" fill="#16213E" stroke="#FFD700" stroke-width="1"/>
    <text x="550" y="28" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="15" font-weight="bold">FORMULA BREAKDOWN</text>
    <line x1="30" y1="38" x2="1070" y2="38" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>

    <!-- Step 1 -->
    <text x="40" y="65" fill="#E8D5B7" font-family="monospace" font-size="13">Step 1: Normalize rotation → x = angle / MAX_Z_TILT</text>
    <text x="40" y="85" fill="#888" font-family="monospace" font-size="12">Example: -30° = -0.524 rad  →  x = -0.524 / 1.047 = -0.50</text>

    <!-- Step 2 -->
    <text x="40" y="112" fill="#E8D5B7" font-family="monospace" font-size="13">Step 2: Convert to t = (x + 1) / 2    (maps [-1,+1] → [0,1])</text>
    <text x="40" y="132" fill="#888" font-family="monospace" font-size="12">Example: t = (-0.50 + 1) / 2 = 0.25</text>

    <!-- Step 3 -->
    <text x="40" y="159" fill="#E8D5B7" font-family="monospace" font-size="13">Step 3: Lerp → y = outMin + t × (outMax - outMin)</text>
    <text x="40" y="179" fill="#888" font-family="monospace" font-size="12">Example: y = 0.1 + 0.25 × 0.8 = 0.30</text>

    <!-- Right side: summary -->
    <text x="700" y="65" fill="#FFD700" font-family="monospace" font-size="13" font-weight="bold">SUMMARY TABLE</text>
    <text x="700" y="85" fill="#888" font-family="monospace" font-size="11">angle    →    x    →    t    →    y</text>
    <text x="700" y="105" fill="#FF6B35" font-family="monospace" font-size="11">-60°  →  -1.00  →  0.00  →  0.10</text>
    <text x="700" y="125" fill="#FF6B35" font-family="monospace" font-size="11">-30°  →  -0.50  →  0.25  →  0.30</text>
    <text x="700" y="145" fill="#FFD700" font-family="monospace" font-size="11">  0°  →   0.00  →  0.50  →  0.50</text>
    <text x="700" y="165" fill="#B849E8" font-family="monospace" font-size="11">+30°  →  +0.50  →  0.75  →  0.70</text>
    <text x="700" y="185" fill="#B849E8" font-family="monospace" font-size="11">+60°  →  +1.00  →  1.00  →  0.90</text>
  </g>
</svg>