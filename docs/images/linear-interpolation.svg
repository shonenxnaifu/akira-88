<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <defs>
    <style>
      .axis { stroke: #333; stroke-width: 1.5; }
      .tick { stroke: #333; stroke-width: 1; }
      .tick-label { font-family: sans-serif; font-size: 12px; fill: #333; text-anchor: middle; }
      .tick-label-y { text-anchor: end; dominant-baseline: middle; }
      .axis-label { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #333; }
      .diagonal { stroke: #22c55e; stroke-width: 2.5; }
      .dashed-line { stroke: #22c55e; stroke-width: 1.5; stroke-dasharray: 6,4; }
      .slope-label { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #000; }
      .joint-label { font-family: sans-serif; font-size: 12px; font-weight: bold; fill: #ef4444; }
      .dot { fill: #000; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="480" height="480" fill="#fff" />

  <!-- Grid lines (light) -->
  <g stroke="#e5e5e5" stroke-width="0.5">
    <!-- Vertical grid -->
    <line x1="162.5" y1="40" x2="162.5" y2="420" />
    <line x1="255" y1="40" x2="255" y2="420" />
    <line x1="347.5" y1="40" x2="347.5" y2="420" />
    <!-- Horizontal grid -->
    <line x1="70" y1="378" x2="440" y2="378" />
    <line x1="70" y1="335" x2="440" y2="335" />
    <line x1="70" y1="293" x2="440" y2="293" />
    <line x1="70" y1="251" x2="440" y2="251" />
    <line x1="70" y1="209" x2="440" y2="209" />
    <line x1="70" y1="167" x2="440" y2="167" />
    <line x1="70" y1="124" x2="440" y2="124" />
    <line x1="70" y1="82" x2="440" y2="82" />
  </g>

  <!-- Axes -->
  <g class="axis">
    <!-- X-axis -->
    <line x1="70" y1="420" x2="440" y2="420" />
    <!-- Y-axis -->
    <line x1="70" y1="40" x2="70" y2="420" />
  </g>

  <!-- X-axis ticks and labels -->
  <g>
    <line class="tick" x1="70" y1="420" x2="70" y2="425" />
    <text class="tick-label" x="70" y="440">-1.0</text>

    <line class="tick" x1="162.5" y1="420" x2="162.5" y2="425" />
    <text class="tick-label" x="162.5" y="440">-0.5</text>

    <line class="tick" x1="255" y1="420" x2="255" y2="425" />
    <text class="tick-label" x="255" y="440">0.0</text>

    <line class="tick" x1="347.5" y1="420" x2="347.5" y2="425" />
    <text class="tick-label" x="347.5" y="440">0.5</text>

    <line class="tick" x1="440" y1="420" x2="440" y2="425" />
    <text class="tick-label" x="440" y="440">1.0</text>
  </g>

  <!-- Y-axis ticks and labels -->
  <g>
    <line class="tick" x1="65" y1="420" x2="70" y2="420" />
    <text class="tick-label tick-label-y" x="62" y="420">0.1</text>

    <line class="tick" x1="65" y1="378" x2="70" y2="378" />
    <text class="tick-label tick-label-y" x="62" y="378">0.2</text>

    <line class="tick" x1="65" y1="335" x2="70" y2="335" />
    <text class="tick-label tick-label-y" x="62" y="335">0.3</text>

    <line class="tick" x1="65" y1="293" x2="70" y2="293" />
    <text class="tick-label tick-label-y" x="62" y="293">0.4</text>

    <line class="tick" x1="65" y1="251" x2="70" y2="251" />
    <text class="tick-label tick-label-y" x="62" y="251">0.5</text>

    <line class="tick" x1="65" y1="209" x2="70" y2="209" />
    <text class="tick-label tick-label-y" x="62" y="209">0.6</text>

    <line class="tick" x1="65" y1="167" x2="70" y2="167" />
    <text class="tick-label tick-label-y" x="62" y="167">0.7</text>

    <line class="tick" x1="65" y1="124" x2="70" y2="124" />
    <text class="tick-label tick-label-y" x="62" y="124">0.8</text>

    <line class="tick" x1="65" y1="82" x2="70" y2="82" />
    <text class="tick-label tick-label-y" x="62" y="82">0.9</text>

    <line class="tick" x1="65" y1="40" x2="70" y2="40" />
    <text class="tick-label tick-label-y" x="62" y="40">1.0</text>
  </g>

  <!-- Axis labels -->
  <text class="axis-label" x="25" y="230" transform="rotate(-90, 25, 230)" text-anchor="middle">delay</text>
  <text class="axis-label" x="255" y="465" text-anchor="middle">angle</text>

  <!-- Dashed horizontal line at y=1.0 -->
  <line class="dashed-line" x1="70" y1="40" x2="440" y2="40" />

  <!-- Dashed vertical line at x=1 -->
  <line class="dashed-line" x1="440" y1="420" x2="440" y2="40" />

  <!-- Diagonal ray from (-1, 0.1) to (1, 1.0) -->
  <line class="diagonal" x1="70" y1="420" x2="440" y2="40" />

  <!-- Joint at (0.53, 0.79) -->
  <line class="dashed-line" x1="70" y1="126" x2="353" y2="126" />
  <line class="dashed-line" x1="353" y1="420" x2="353" y2="126" />
  <circle class="dot" cx="353" cy="126" r="5" />

  <!-- Black dot at (1, 1.0) -->
  <circle class="dot" cx="440" cy="40" r="5" />

  <!-- Joint labels -->
  <text class="joint-label" x="363" y="286" text-anchor="start">x=0.53</text>
  <text class="joint-label" x="218" y="116" text-anchor="middle">y=0.79</text>
  <text class="slope-label" x="430" y="32" text-anchor="end" font-size="12px">(x₂=1, y₂=1)</text>
  <text class="slope-label" x="78" y="412" text-anchor="start" font-size="12px">(x₁=-1, y₁=0.1)</text>

  <!-- Slope label "slope (ꭤ)" along the diagonal -->
  <text class="slope-label" x="230" y="255" transform="rotate(-45.6, 230, 255)" text-anchor="middle">slope (ꭤ)</text>
</svg>
