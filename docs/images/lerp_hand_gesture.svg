<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" width="1200" height="900">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#FF6B35;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8D5B7;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#E8D5B7;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FF6B35"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="#1A1A2E" rx="12"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" fill="#E8D5B7" font-family="monospace" font-size="22" font-weight="bold">Hand Gesture → Linear Interpolation → Bass Delay Parameter</text>
  <line x1="100" y1="60" x2="1100" y2="60" stroke="#FF6B35" stroke-width="1" opacity="0.5"/>

  <!-- ============================================ -->
  <!-- SECTION 1: HAND GESTURE (physical world)     -->
  <!-- ============================================ -->
  <text x="600" y="95" text-anchor="middle" fill="#FF6B35" font-family="monospace" font-size="16" font-weight="bold">STEP 1: HAND GESTURE — Physical Tilt (Y-Z Plane)</text>

  <!-- Hand 1: Tilted toward camera (-60°) -->
  <g transform="translate(200, 200)">
    <!-- Wrist -->
    <circle cx="50" cy="80" r="4" fill="#E8D5B7"/>
    <text x="50" y="100" text-anchor="middle" fill="#E8D5B7" font-family="monospace" font-size="11">wrist</text>
    <!-- Hand pointing toward camera (tilted) -->
    <line x1="50" y1="80" x2="30" y2="20" stroke="#FF6B35" stroke-width="3" stroke-linecap="round"/>
    <circle cx="30" cy="20" r="4" fill="#FF6B35" filter="url(#glow)"/>
    <text x="30" y="10" text-anchor="middle" fill="#FF6B35" font-family="monospace" font-size="11">middle tip</text>
    <!-- Angle arc -->
    <path d="M 50 65 A 15 15 0 0 0 40 50" fill="none" stroke="#FFD700" stroke-width="1.5"/>
    <text x="35" y="45" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="12" font-weight="bold">-60°</text>
    <!-- z,y labels -->
    <text x="50" y="120" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">y=0.7, z=0.001</text>
    <text x="30" y="-5" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">y=0.3, z=-0.08</text>
  </g>

  <!-- Hand 2: Straight up (0°) -->
  <g transform="translate(550, 200)">
    <!-- Wrist -->
    <circle cx="50" cy="80" r="4" fill="#E8D5B7"/>
    <text x="50" y="100" text-anchor="middle" fill="#E8D5B7" font-family="monospace" font-size="11">wrist</text>
    <!-- Hand pointing straight up -->
    <line x1="50" y1="80" x2="50" y2="15" stroke="#FF6B35" stroke-width="3" stroke-linecap="round"/>
    <circle cx="50" cy="15" r="4" fill="#FF6B35" filter="url(#glow)"/>
    <text x="50" y="5" text-anchor="middle" fill="#FF6B35" font-family="monospace" font-size="11">middle tip</text>
    <!-- Angle arc (0°) -->
    <text x="65" y="50" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="12" font-weight="bold">0°</text>
    <!-- z,y labels -->
    <text x="50" y="120" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">y=0.7, z=0.001</text>
    <text x="50" y="-5" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">y=0.3, z=-0.02</text>
  </g>

  <!-- Hand 3: Tilted away from camera (+60°) -->
  <g transform="translate(900, 200)">
    <!-- Wrist -->
    <circle cx="50" cy="80" r="4" fill="#E8D5B7"/>
    <text x="50" y="100" text-anchor="middle" fill="#E8D5B7" font-family="monospace" font-size="11">wrist</text>
    <!-- Hand pointing away from camera (tilted) -->
    <line x1="50" y1="80" x2="70" y2="20" stroke="#FF6B35" stroke-width="3" stroke-linecap="round"/>
    <circle cx="70" cy="20" r="4" fill="#FF6B35" filter="url(#glow)"/>
    <text x="70" y="10" text-anchor="middle" fill="#FF6B35" font-family="monospace" font-size="11">middle tip</text>
    <!-- Angle arc -->
    <path d="M 50 65 A 15 15 0 0 1 60 50" fill="none" stroke="#FFD700" stroke-width="1.5"/>
    <text x="68" y="45" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="12" font-weight="bold">+60°</text>
    <!-- z,y labels -->
    <text x="50" y="120" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">y=0.7, z=0.001</text>
    <text x="70" y="-5" text-anchor="middle" fill="#888" font-family="monospace" font-size="10">y=0.3, z=+0.06</text>
  </g>

  <!-- Camera direction indicator -->
  <text x="600" y="310" text-anchor="middle" fill="#888" font-family="monospace" font-size="12">Camera is "above" the diagram — z-axis points toward you (negative = closer, positive = farther)</text>

  <!-- ============================================ -->
  <!-- SECTION 2: NORMALIZATION (math layer)        -->
  <!-- ============================================ -->
  <text x="600" y="360" text-anchor="middle" fill="#FF6B35" font-family="monospace" font-size="16" font-weight="bold">STEP 2: NORMALIZATION — Convert Angle to Universal Signal [-1, +1]</text>

  <!-- Formula box -->
  <rect x="350" y="380" width="500" height="50" rx="8" fill="#16213E" stroke="#FF6B35" stroke-width="1" opacity="0.8"/>
  <text x="600" y="410" text-anchor="middle" fill="#E8D5B7" font-family="monospace" font-size="16">z-tilt / MAX_Z_TILT  =  z-tilt / (π/3)  =  normalized signal in [-1, +1]</text>

  <!-- Three values -->
  <g transform="translate(200, 450)">
    <rect x="0" y="0" width="150" height="60" rx="6" fill="#16213E" stroke="#FF6B35" stroke-width="1"/>
    <text x="75" y="25" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="14" font-weight="bold">-60° → -1.047 rad</text>
    <text x="75" y="45" text-anchor="middle" fill="#FF6B35" font-family="monospace" font-size="16" font-weight="bold">÷ (π/3) = -1.0</text>
  </g>

  <g transform="translate(525, 450)">
    <rect x="0" y="0" width="150" height="60" rx="6" fill="#16213E" stroke="#FF6B35" stroke-width="1"/>
    <text x="75" y="25" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="14" font-weight="bold">0° → 0 rad</text>
    <text x="75" y="45" text-anchor="middle" fill="#FF6B35" font-family="monospace" font-size="16" font-weight="bold">÷ (π/3) = 0.0</text>
  </g>

  <g transform="translate(850, 450)">
    <rect x="0" y="0" width="150" height="60" rx="6" fill="#16213E" stroke="#FF6B35" stroke-width="1"/>
    <text x="75" y="25" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="14" font-weight="bold">+60° → +1.047 rad</text>
    <text x="75" y="45" text-anchor="middle" fill="#FF6B35" font-family="monospace" font-size="16" font-weight="bold">÷ (π/3) = +1.0</text>
  </g>

  <!-- Arrow down -->
  <line x1="600" y1="520" x2="600" y2="560" stroke="#FF6B35" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="610" y="545" fill="#E8D5B7" font-family="monospace" font-size="12">x = normalized signal</text>

  <!-- ============================================ -->
  <!-- SECTION 3: LINEAR INTERPOLATION (lerp graph) -->
  <!-- ============================================ -->
  <text x="600" y="590" text-anchor="middle" fill="#FF6B35" font-family="monospace" font-size="16" font-weight="bold">STEP 3: LINEAR INTERPOLATION — Map [-1, +1] to [0.1, 0.9]</text>

  <!-- Graph area -->
  <g transform="translate(200, 610)">
    <!-- Axes -->
    <line x1="50" y1="180" x2="750" y2="180" stroke="#E8D5B7" stroke-width="1.5"/>
    <line x1="50" y1="20" x2="50" y2="180" stroke="#E8D5B7" stroke-width="1.5"/>

    <!-- Axis labels -->
    <text x="400" y="210" text-anchor="middle" fill="#E8D5B7" font-family="monospace" font-size="13">x = normalized gesture signal [-1, +1]</text>
    <text x="15" y="100" text-anchor="middle" fill="#E8D5B7" font-family="monospace" font-size="13" transform="rotate(-90, 15, 100)">y = delay feedback</text>

    <!-- X-axis ticks -->
    <line x1="50" y1="180" x2="50" y2="185" stroke="#E8D5B7" stroke-width="1"/>
    <text x="50" y="198" text-anchor="middle" fill="#FF6B35" font-family="monospace" font-size="12" font-weight="bold">-1.0</text>

    <line x1="400" y1="180" x2="400" y2="185" stroke="#E8D5B7" stroke-width="1"/>
    <text x="400" y="198" text-anchor="middle" fill="#FF6B35" font-family="monospace" font-size="12" font-weight="bold">0.0</text>

    <line x1="750" y1="180" x2="750" y2="185" stroke="#E8D5B7" stroke-width="1"/>
    <text x="750" y="198" text-anchor="middle" fill="#FF6B35" font-family="monospace" font-size="12" font-weight="bold">+1.0</text>

    <!-- Y-axis ticks -->
    <line x1="45" y1="180" x2="50" y2="180" stroke="#E8D5B7" stroke-width="1"/>
    <text x="35" y="184" text-anchor="end" fill="#FF6B35" font-family="monospace" font-size="12" font-weight="bold">0.1</text>

    <line x1="45" y1="100" x2="50" y2="100" stroke="#E8D5B7" stroke-width="1"/>
    <text x="35" y="104" text-anchor="end" fill="#FF6B35" font-family="monospace" font-size="12" font-weight="bold">0.5</text>

    <line x1="45" y1="20" x2="50" y2="20" stroke="#E8D5B7" stroke-width="1"/>
    <text x="35" y="24" text-anchor="end" fill="#FF6B35" font-family="monospace" font-size="12" font-weight="bold">0.9</text>

    <!-- Calibration points -->
    <circle cx="50" cy="180" r="6" fill="#FF6B35" filter="url(#glow)"/>
    <text x="50" y="200" text-anchor="middle" fill="#E8D5B7" font-family="monospace" font-size="10">(-1, 0.1)</text>

    <circle cx="750" cy="20" r="6" fill="#FF6B35" filter="url(#glow)"/>
    <text x="750" y="15" text-anchor="middle" fill="#E8D5B7" font-family="monospace" font-size="10">(+1, 0.9)</text>

    <!-- Interpolation line -->
    <line x1="50" y1="180" x2="750" y2="20" stroke="#FF6B35" stroke-width="3" opacity="0.8"/>

    <!-- Example point: x=0.3 → y=0.34 -->
    <!-- x=0.3 maps to: 50 + (0.3+1)/2 * 700 = 50 + 0.65 * 700 = 50 + 455 = 505 -->
    <!-- y=0.34 maps to: 180 - (0.34-0.1)/(0.9-0.1) * 160 = 180 - 0.3 * 160 = 180 - 48 = 132 -->
    <circle cx="505" cy="132" r="5" fill="#FFD700" filter="url(#glow)"/>
    <line x1="505" y1="132" x2="505" y2="180" stroke="#FFD700" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>
    <line x1="50" y1="132" x2="505" y2="132" stroke="#FFD700" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>
    <text x="505" y="125" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="11" font-weight="bold">x=0.3 → y=0.34</text>

    <!-- Formula annotation -->
    <rect x="200" y="5" width="350" height="45" rx="6" fill="#16213E" stroke="#FFD700" stroke-width="1" opacity="0.9"/>
    <text x="375" y="22" text-anchor="middle" fill="#FFD700" font-family="monospace" font-size="12">y = 0.1 + ((x+1)/2) × 0.8</text>
    <text x="375" y="38" text-anchor="middle" fill="#E8D5B7" font-family="monospace" font-size="11">y = 0.1 + 0.65 × 0.8 = 0.34</text>
  </g>

  <!-- Arrow down to output -->
  <line x1="600" y1="820" x2="600" y2="860" stroke="#FF6B35" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- ============================================ -->
  <!-- SECTION 4: PARAMETER OUTPUT (sound layer)    -->
  <!-- ============================================ -->
  <text x="600" y="875" text-anchor="middle" fill="#FF6B35" font-family="monospace" font-size="16" font-weight="bold">STEP 4: PARAMETER OUTPUT — Apply to Tone.js</text>
</svg>